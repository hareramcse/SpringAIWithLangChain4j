services:
    postgres:
        image: pgvector/pgvector:pg17
        container_name: postgres
        ports:
            - "5432:5432"
        restart: always
        environment:
            - POSTGRES_PASSWORD=password
            - POSTGRES_USER=postgres
            - POSTGRES_DB=postgres
        volumes:
            - pgdata:/var/lib/postgresql/data

volumes:
    pgdata:
