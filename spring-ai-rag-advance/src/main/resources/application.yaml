spring:
  application:
    name: spring-ai-rag

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
      model-name: gpt-4o-mini
      temperature: 0.0
      max-tokens: 200
      log-requests: true
      log-responses: true
    embedding-model:
      api-key: ${OPENAI_API_KEY}
      model-name: text-embedding-3-small
      dimensions: 512

app:
  eval:
    # Set true only locally to expose POST /eval/run (uses OpenAI like /chat). Cases: separate JSON from ingest corpus.
    http-enabled: false
    dataset-resource: "classpath:eval/golden-set.json"
  rag:
    guardrail:
      # When reranking is on: if max RERANKED_SCORE among final chunks is below min-rerank-score, no excerpts are sent (model should reply with no-evidence-message).
      enabled: true
      min-rerank-score: 0.22
      # Must match RagGuardrailMessages.NO_EVIDENCE_RESPONSE unless you change that constant too.
      no-evidence-message: "Not found in documents"
    retrieval:
      min-score: 0.3
      # Final number of chunks passed to the chat model after re-rank + optional MMR.
      max-results: 3
      # Wider dense retrieval pool when re-ranking is on; must be >= rerank-candidate-cap.
      initial-max-results: 15
    reranking:
      enabled: true
      # Batched LLM cross-encoder-style relevance scores per segment.
      cross-encoder-max-segments-per-call: 6
      # How many fused passages receive cross-encoder scores before MMR / final trim (>= max-results).
      rerank-candidate-cap: 12
      mmr-enabled: true
      # Balance relevance vs diversity in [0,1] (higher = more relevance to query, lower = more diversity).
      mmr-lambda: 0.5
      # Optional minimum re-rank score after cross-encoder (omit for no floor).
      # min-score: 0.1
    # Bound via AppRagProperties.chunking() → ChunkingConfig
    chunking:
      # Which splitter to use: RECURSIVE | PARAGRAPH | SENTENCE | LINE | WORD | CHARACTER
      strategy: RECURSIVE
      # Target max segment size in characters (hierarchical strategies cap blocks before sub-splitting).
      max-segment-size-chars: 300
      # Character overlap between adjacent chunks where the splitter supports it.
      max-overlap-chars: 50
  pgvector:
    host: localhost
    port: 5432
    database: RAG
    user: postgres
    password: password
    table: langchain4j_embeddings
    dimension: 512
    # STORED generated tsvector + GIN (see PgVectorGeneratedFtsInitializer). Use "simple" for IDs/codes; "english" for stemming.
    text-search-config: simple
    tsv-column: text_tsv
    hybrid-retrieval: true
    rrf-k: 60
