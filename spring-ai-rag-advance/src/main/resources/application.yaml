spring:
  application:
    name: spring-ai-rag
  # Primary datasource for Flyway + JdbcTemplate (same DB as LangChain4j pgvector; URLs mirror app.pgvector).
  datasource:
    url: jdbc:postgresql://${app.pgvector.host}:${app.pgvector.port}/${app.pgvector.database}
    username: ${app.pgvector.user}
    password: ${app.pgvector.password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    placeholders:
      pgvector_table: ${app.pgvector.table}
      pgvector_dimension: ${app.pgvector.dimension}
      pgvector_tsv_column: ${app.pgvector.tsv-column}
      pgvector_textsearch: ${app.pgvector.text-search-config}
      pgvector_gin_index: ${app.pgvector.table}_${app.pgvector.tsv-column}_gin_idx

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
      model-name: gpt-4o-mini
      temperature: 0.0
      max-tokens: 200
      log-requests: true
      log-responses: true
    embedding-model:
      api-key: ${OPENAI_API_KEY}
      model-name: text-embedding-3-small
      dimensions: 512

app:
  rag:
    guardrail:
      enabled: true
      min-rerank-score: 0.22
      no-evidence-message: "Not found in documents"
    retrieval:
      min-score: 0.3
      max-results: 3
      initial-max-results: 15
    reranking:
      # Score retrieved chunks with the chat model, then keep top retrieval.max-results for the answer model.
      enabled: false
      cross-encoder-max-segments-per-call: 6
    chunking:
      max-segment-size-chars: 300
      max-overlap-chars: 50
  pgvector:
    host: localhost
    port: 5432
    database: RAG
    user: postgres
    password: password
    table: langchain4j_embeddings
    dimension: 512
    text-search-config: simple
    tsv-column: text_tsv
    hybrid-retrieval: true
    hybrid-vector-max-results: 5
    hybrid-keyword-max-results: 5

  chat:
    safety:
      enabled: true
      max-query-chars: 8000
      max-response-chars: 32000
      extra-blocked-query-regexes: []
      extra-blocked-response-regexes: []
      post-llm-judge-enabled: false
      unsafe-response-fallback: "I can't verify that answer. Please rephrase your question or try again."
      reject-unsafe-response-with-error: true
