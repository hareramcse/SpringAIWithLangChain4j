spring:
  application:
    name: spring-ai-rag

langchain4j:
  open-ai:
    chat-model:
      api-key: ${OPENAI_API_KEY}
      model-name: gpt-4o-mini
      temperature: 0.0
      max-tokens: 200
      log-requests: true
      log-responses: true
    embedding-model:
      api-key: ${OPENAI_API_KEY}
      model-name: text-embedding-3-small
      dimensions: 512

app:
  pgvector:
    host: localhost
    port: 5432
    database: RAG
    user: postgres
    password: password
    table: langchain4j_embeddings
    dimension: 512
